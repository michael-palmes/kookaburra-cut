name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck and build
        run: pnpm build

      - name: Test
        run: pnpm test

  rust:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri::generate_context!() reads frontendDist (../dist) at compile time, so build the frontend first.
      - name: Build frontend
        run: pnpm build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "src-tauri -> target"

      # tauri-build validates externalBin paths; the real sidecars are gitignored and check/clippy never run them.
      - name: Stub ffmpeg sidecars
        run: |
          triple="$(rustc -vV | sed -n 's/host: //p')"
          mkdir -p src-tauri/bin
          for bin in ffmpeg ffprobe; do
            printf '#!/bin/sh\nexit 0\n' > "src-tauri/bin/${bin}-${triple}"
            chmod +x "src-tauri/bin/${bin}-${triple}"
          done

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings
